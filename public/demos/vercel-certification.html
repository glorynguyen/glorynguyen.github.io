<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vercel Certification Tracker | Vincent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; }
        .card { background: #111; border: 1px solid #333; border-radius: 8px; }
        .progress-accent { accent-color: #0070f3; }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-end border-b border-gray-800 pb-6 mb-8">
            <div>
                <h1 class="text-3xl font-bold tracking-tight">Vercel Daily News</h1>
                <p class="text-gray-400">Cohort 2 Certification • Vincent</p>
            </div>
            <div class="text-right">
                <p class="text-sm uppercase tracking-widest text-gray-500">Deadline</p>
                <p class="text-xl font-semibold text-red-500">April 18, 2026</p>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="card p-6">
                <h3 class="text-gray-500 text-sm mb-1">Days Remaining</h3>
                <p id="days-left" class="text-4xl font-bold">--</p>
            </div>
            <div class="card p-6">
                <h3 class="text-gray-500 text-sm mb-1">Hours Estimated</h3>
                <p class="text-4xl font-bold">~31h</p>
            </div>
            <div class="card p-6">
                <h3 class="text-gray-500 text-sm mb-1">Current Progress</h3>
                <p id="progress-percent" class="text-4xl font-bold">0%</p>
            </div>
        </div>

        <div class="card p-8">
            <h2 class="text-xl font-semibold mb-6">Certification Roadmap</h2>
            
            <div class="space-y-6">
                <div>
                    <h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-3">1. Preparation (Required)</h3>
                    <div class="space-y-3">
                        <label class="flex items-center space-x-3 cursor-pointer">
                            <input type="checkbox" class="task-item progress-accent w-5 h-5" data-weight="6">
                            <span>Vercel Academy: Next.js Foundations <span class="text-gray-500 text-sm">(~6h)</span></span>
                        </label>
                        <label class="flex items-center space-x-3 cursor-pointer">
                            <input type="checkbox" class="task-item progress-accent w-5 h-5" data-weight="4">
                            <span>Next.js Learn Course <span class="text-gray-500 text-sm">(~4h)</span></span>
                        </label>
                    </div>
                </div>

                <div>
                    <h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-3">2. Development (15-20h)</h3>
                    <div class="space-y-3">
                        <label class="flex items-center space-x-3 cursor-pointer">
                            <input type="checkbox" class="task-item progress-accent w-5 h-5" data-weight="2">
                            <span>Setup GitHub Repo & Starter Template</span>
                        </label>
                        <label class="flex items-center space-x-3 cursor-pointer">
                            <input type="checkbox" class="task-item progress-accent w-5 h-5" data-weight="15">
                            <span>Feature Implementation (Vercel Daily News)</span>
                        </label>
                        <label class="flex items-center space-x-3 cursor-pointer">
                            <input type="checkbox" class="task-item progress-accent w-5 h-5" data-weight="3">
                            <span>Production Deployment (*.vercel.app)</span>
                        </label>
                    </div>
                </div>

                <div>
                    <h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-3">3. Submission</h3>
                    <div class="space-y-3">
                        <label class="flex items-center space-x-3 cursor-pointer">
                            <input type="checkbox" class="task-item progress-accent w-5 h-5" data-weight="1">
                            <span>Record Architecture Video Walkthrough <span class="text-gray-500 text-sm">(~1h)</span></span>
                        </label>
                        <label class="flex items-center space-x-3 cursor-pointer">
                            <input type="checkbox" class="task-item progress-accent w-5 h-5" data-weight="0.5">
                            <span>Send Submission Email (Alex, Joey, & Team)</span>
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <footer class="mt-8 text-center text-gray-600 text-sm">
            Keep shipping. You've got this, Vincent.
        </footer>
    </div>

    <script>
        const deadline = new Date('April 18, 2026 23:59:59').getTime();
        const tasks = document.querySelectorAll('.task-item');
        const progressEl = document.getElementById('progress-percent');
        const daysEl = document.getElementById('days-left');

        function updateUI() {
            // Update Countdown
            const now = new Date().getTime();
            const diff = deadline - now;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            daysEl.innerText = days > 0 ? days : "Due!";

            // Update Progress
            let totalWeight = 0;
            let completedWeight = 0;
            tasks.forEach(task => {
                const weight = parseFloat(task.dataset.weight);
                totalWeight += weight;
                if (task.checked) completedWeight += weight;
            });
            const percent = Math.round((completedWeight / totalWeight) * 100);
            progressEl.innerText = `${percent}%`;

            // Save to LocalStorage
            const state = Array.from(tasks).map(t => t.checked);
            localStorage.setItem('vercelProgress', JSON.stringify(state));
        }

        // Load State
        const savedState = JSON.parse(localStorage.getItem('vercelProgress'));
        if (savedState) {
            tasks.forEach((task, i) => task.checked = savedState[i]);
        }

        tasks.forEach(task => task.addEventListener('change', updateUI));
        updateUI();
    </script>
</body>
</html>
